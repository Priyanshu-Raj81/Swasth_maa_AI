<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Swasth Maa AI - Splash Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#30e830",
                        "primary-dark": "#25b825", // Darker shade for text/contrast
                        "background-light": "#f6f8f6",
                        "background-dark": "#112111",
                        "neutral-surface": "#eef5ee", // Derived from green hue
                        "neutral-text": "#1a2e1a", // Derived from green hue
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-neutral-text dark:text-slate-100 flex justify-center w-full min-h-screen">
<!-- Mobile Container -->
<div class="relative flex flex-col w-full max-w-md min-h-screen shadow-2xl overflow-hidden bg-background-light dark:bg-background-dark">
<!-- Decorative Background Pattern (Subtle leaves/waves) -->
<div class="absolute inset-0 opacity-10 pointer-events-none z-0" style="background-image: radial-gradient(#30e830 1px, transparent 1px); background-size: 24px 24px;">
</div>
<!-- Decorative Circle Top Right -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/20 rounded-full blur-3xl z-0"></div>
<!-- Decorative Circle Bottom Left -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl z-0"></div>
<!-- Content Wrapper -->
<div class="relative z-10 flex flex-col h-full p-6 flex-grow">
<!-- Top Spacer -->
<div class="flex-1"></div>
<!-- Hero Section -->
<div class="flex flex-col items-center justify-center gap-6">
<!-- Logo Container -->
<div class="relative group">
<div class="absolute inset-0 bg-primary/30 rounded-full blur-xl transform group-hover:scale-105 transition-transform duration-500"></div>
<div class="relative w-48 h-48 rounded-full overflow-hidden border-4 border-white dark:border-background-dark shadow-lg bg-white dark:bg-gray-800 flex items-center justify-center">
<img alt="Mother and Child" class="w-full h-full object-cover opacity-90" data-alt="Indian mother holding baby with love and care outdoors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdXWTNW_zo16qicAwJpV2sXmE-UoZgzAXFWgPCQt9eyEkXMDMHcvSzitnUzYt-S07VywIh7kSySy7e_5rxNpvm8FStp23eSRTR440WjxO_dnj9YPv2dLVjIvp0VdUvBf_qMF-ZdWxGG-pRp0aoKIZ5fA-3tYg5422QIPxP88wYz6jvYIjeap_gvE1x7xdcIr50pleVbR-sft50idZVVyJ91rAyQHJlUDXLMY1dIpCAR5rNOaB_6Du3jXRuTfgj6ZRpwqw6LMqZNww"/>
</div>
<!-- Icon Overlay Badge -->
<div class="absolute bottom-2 right-2 bg-primary text-background-dark p-2 rounded-full border-4 border-white dark:border-background-dark shadow-sm">
<span class="material-symbols-outlined text-2xl leading-none">health_and_safety</span>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-2 mt-4">
<h1 class="text-neutral-text dark:text-white text-3xl font-bold tracking-tight">
                        Swasth Maa AI
                    </h1>
<p class="text-neutral-text/70 dark:text-slate-300 text-lg font-medium leading-relaxed px-4">
                        AI Powered Maa aur Baccha Suraksha
                    </p>
</div>
</div>
<!-- Bottom Spacer -->
<div class="flex-1"></div>
<!-- Action Area -->
<div class="w-full pb-8 pt-4">
<button class="w-full relative group cursor-pointer overflow-hidden rounded-xl bg-primary hover:bg-primary-dark transition-colors duration-300 h-14 flex items-center justify-center shadow-lg shadow-primary/20 active:scale-[0.98]">
<div class="flex items-center justify-center gap-2 px-6">
<span class="text-background-dark text-lg font-bold tracking-wide">Aage Badhein</span>
<span class="material-symbols-outlined text-background-dark group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
<!-- Button Shine Effect -->
<div class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/20 to-transparent z-10"></div>
</button>
<p class="text-center text-xs text-neutral-text/40 dark:text-slate-500 mt-4 font-medium">
                    Version 1.0 • Secure &amp; Private
                </p>
</div>
</div>
</div>
</body></html>
