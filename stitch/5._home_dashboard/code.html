<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Swasth Maa AI - Home Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#19e619",
                        "primary-dark": "#12a812",
                        "primary-light": "#e7fce7",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112111",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2e1a",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary/30">
<!-- Main Content Area -->
<main class="flex-1 pb-24">
<!-- Header -->
<header class="sticky top-0 z-20 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm px-4 pt-12 pb-4 border-b border-primary/10">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="relative">
<div class="h-12 w-12 rounded-full bg-cover bg-center border-2 border-primary" data-alt="Portrait of an Indian woman smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCfi9EgA5uC8gpM26ZSSJ4-hMMO4NDdA0LlZYhKYR9bq1jLUv04pLmESZPUAgtuT7BYbcehTqhd6rpO11jmNerlFfH29oKGmSBcTzVdZFu-_4t58T-Ts0kuh-w9A3lMYCWn5tx349F29TPTmS-jwpNcnfe2WKq8iutGlEN4tKM3A6oB2l8Ptgy_bx-8aBWwy1YY7hdA2DkNukwR__m6imdX5f3lIbrZcOw1tKatX9Ej_wM6-4p66Usy6VNEYsntxi7MeTYxwqd5cJA");'></div>
<div class="absolute bottom-0 right-0 h-3 w-3 rounded-full bg-primary border-2 border-background-light dark:border-background-dark"></div>
</div>
<div class="flex flex-col">
<span class="text-sm text-slate-500 dark:text-slate-400 font-medium">Namaste,</span>
<h1 class="text-xl font-bold leading-tight">Sita Devi</h1>
</div>
</div>
<button class="relative p-2 rounded-full bg-white dark:bg-surface-dark shadow-sm hover:bg-primary/10 transition-colors group">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-200 group-hover:text-primary transition-colors">notifications</span>
<span class="absolute top-2 right-2.5 h-2 w-2 rounded-full bg-red-500 ring-2 ring-white dark:ring-surface-dark"></span>
</button>
</div>
<!-- Pregnancy Status Pill -->
<div class="mt-6">
<div class="flex items-center justify-between bg-primary/10 rounded-xl p-4 border border-primary/20">
<div class="flex flex-col">
<span class="text-xs font-semibold uppercase tracking-wider text-primary-dark dark:text-primary">Current Status</span>
<p class="text-lg font-bold text-slate-800 dark:text-slate-100">Week 24 of Pregnancy</p>
</div>
<div class="h-10 w-10 flex items-center justify-center rounded-full bg-white dark:bg-surface-dark text-primary shadow-sm">
<span class="material-symbols-outlined">child_care</span>
</div>
</div>
</div>
</header>
<!-- Main Action Grid -->
<section class="px-4 py-6">
<h2 class="text-lg font-bold mb-4 px-1">Quick Actions</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Card 1: Health Check (Primary Emphasis) -->
<button class="col-span-2 sm:col-span-1 relative overflow-hidden group rounded-2xl bg-gradient-to-br from-primary to-primary-dark p-1 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
<div class="relative z-10 flex h-full flex-col items-start justify-between bg-transparent p-5 text-white">
<div class="rounded-full bg-white/20 p-3 backdrop-blur-sm">
<span class="material-symbols-outlined text-3xl">stethoscope</span>
</div>
<div class="mt-8 text-left">
<h3 class="text-xl font-bold leading-none">Check Symptoms</h3>
<p class="mt-2 text-sm text-white/90 font-medium">AI Health Assistant</p>
</div>
</div>
<!-- Decorative Circle -->
<div class="absolute -right-8 -top-8 h-32 w-32 rounded-full bg-white/10 blur-2xl"></div>
</button>
<!-- Card 2: Vaccinations -->
<button class="flex flex-col items-start justify-between rounded-2xl bg-white dark:bg-surface-dark p-5 shadow-sm border border-slate-100 dark:border-slate-800 transition-all active:scale-[0.98] active:bg-slate-50 dark:active:bg-slate-800/50">
<div class="rounded-full bg-orange-100 dark:bg-orange-900/30 p-3 text-orange-600 dark:text-orange-400">
<span class="material-symbols-outlined text-3xl">vaccines</span>
</div>
<div class="mt-6 text-left w-full">
<h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">Vaccines</h3>
<div class="mt-1 flex items-center gap-1.5 rounded-full bg-orange-50 dark:bg-orange-900/20 py-1 px-2 w-fit">
<span class="h-1.5 w-1.5 rounded-full bg-orange-500"></span>
<span class="text-xs font-medium text-orange-700 dark:text-orange-300">Due Oct 12</span>
</div>
</div>
</button>
<!-- Card 3: Records -->
<button class="flex flex-col items-start justify-between rounded-2xl bg-white dark:bg-surface-dark p-5 shadow-sm border border-slate-100 dark:border-slate-800 transition-all active:scale-[0.98] active:bg-slate-50 dark:active:bg-slate-800/50">
<div class="rounded-full bg-blue-100 dark:bg-blue-900/30 p-3 text-blue-600 dark:text-blue-400">
<span class="material-symbols-outlined text-3xl">folder_open</span>
</div>
<div class="mt-6 text-left">
<h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">My Records</h3>
<p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Reports &amp; Prescriptions</p>
</div>
</button>
<!-- Card 4: Help -->
<button class="flex flex-col items-start justify-between rounded-2xl bg-white dark:bg-surface-dark p-5 shadow-sm border border-slate-100 dark:border-slate-800 transition-all active:scale-[0.98] active:bg-slate-50 dark:active:bg-slate-800/50">
<div class="rounded-full bg-red-100 dark:bg-red-900/30 p-3 text-red-600 dark:text-red-400">
<span class="material-symbols-outlined text-3xl">sos</span>
</div>
<div class="mt-6 text-left">
<h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">Get Help</h3>
<p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Emergency &amp; Support</p>
</div>
</button>
</div>
</section>
<!-- Daily Insight Card -->
<section class="px-4 pb-6">
<h2 class="text-lg font-bold mb-4 px-1">Daily Insight</h2>
<div class="relative overflow-hidden rounded-2xl bg-white dark:bg-surface-dark shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex flex-row">
<div class="flex-1 p-5 flex flex-col justify-center">
<span class="inline-block w-fit rounded-lg bg-primary/10 px-2 py-1 text-xs font-bold text-primary-dark dark:text-primary mb-2">Nutrition Tip</span>
<p class="text-sm font-medium text-slate-700 dark:text-slate-300 line-clamp-3">
                            Eating iron-rich foods like spinach and lentils helps prevent anemia and keeps you and your baby strong.
                        </p>
</div>
<div class="w-1/3 bg-cover bg-center min-h-[120px]" data-alt="Close up of fresh green vegetables and healthy food" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC5N53v1bDNXf3cvKxJPK-jzETpgacfHEc-M4ij2wqJGK0yAt6uujKcyIebfc0hFJs4DG30tu7b4cf-vZP0A1MXpyL-JEraET1NYOF3X7kIx5CGf9u-Jiv69rUrPsbRlyI9p3SSPMmaB4Qp9sTlli2FxPLy1RcpwgMDeTSttVAzDzmowm8nQlWnAwYOHx-gjzPnIL1fNSFJsWmly1b45tPiqm79mnUwSPFN3wQZYupKMiXovraMe4b68S_qNvD8gUAR98Kx00mYkog");'>
</div>
</div>
</div>
</section>
<div class="h-6"></div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-surface-dark/95 backdrop-blur-md pb-safe">
<div class="flex items-center justify-around px-2 pt-2 pb-5">
<!-- Home (Active) -->
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 w-12 items-center justify-center rounded-full bg-primary/10">
<span class="material-symbols-outlined text-[24px] font-variation-settings-'FILL'1">home</span>
</div>
<span class="text-[10px] font-bold tracking-wide">Home</span>
</a>
<!-- Ask AI -->
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 w-12 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">chat_bubble</span>
</div>
<span class="text-[10px] font-medium tracking-wide">Ask AI</span>
</a>
<!-- Community -->
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 w-12 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">groups</span>
</div>
<span class="text-[10px] font-medium tracking-wide">Community</span>
</a>
<!-- Profile -->
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 w-12 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">person</span>
</div>
<span class="text-[10px] font-medium tracking-wide">Profile</span>
</a>
</div>
</nav>
<!-- Safe area padding fix for iOS -->
<style>
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        /* Material Symbols settings */
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
        .font-variation-settings-'FILL'1 {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</body></html>
